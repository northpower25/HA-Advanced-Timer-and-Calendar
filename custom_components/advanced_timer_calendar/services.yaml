  description: Trigger a sync with external calendar accounts.
  fields:
    account_id:
      name: Account ID
      description: ID of the account to sync (leave empty to sync all).
      selector:
        text:

add_calendar_account:
  name: Add Calendar Account
  description: Add a new external calendar account (Microsoft, Google, Apple).
  fields:
    name:
      name: Name
      description: Display name for this account.
      required: true
      selector:
        text:
    provider:
      name: Provider
      description: "Calendar provider: microsoft, google, apple."
      required: true
      selector:
        select:
          options:
            - microsoft
            - google
            - apple
    sync_direction:
      name: Sync Direction
      description: "Direction of sync: bidirectional, inbound, outbound."
      default: bidirectional
      selector:
        select:
          options:
            - bidirectional
            - inbound
            - outbound
    conflict_strategy:
      name: Conflict Strategy
      description: "How to resolve conflicts: ha_wins, remote_wins, newest_wins, manual."
      default: newest_wins
      selector:
        select:
          options:
            - ha_wins
            - remote_wins
            - newest_wins
            - manual
    client_id:
      name: Client ID
      description: OAuth client ID for Microsoft or Google.
      selector:
        text:
    client_secret:
      name: Client Secret
      description: OAuth client secret.
      selector:
        text:
    tenant_id:
      name: Tenant ID
      description: Azure tenant ID for Microsoft accounts.
      selector:
        text:
    username:
      name: Username
      description: Username for Apple/CalDAV authentication.
      selector:
        text:
    password:
      name: Password
      description: Password or app-specific password for Apple/CalDAV.
      selector:
        text:
    caldav_url:
      name: CalDAV URL
      description: CalDAV server URL for Apple or generic CalDAV.
      selector:
        text:

