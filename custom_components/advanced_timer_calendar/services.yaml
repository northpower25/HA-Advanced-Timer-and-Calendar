create_timer:
  name: Create Timer
  description: Create a new timer with a specified schedule.
  fields:
    name:
      name: Name
      description: Name of the timer.
      required: true
      example: "Morning Lights"
      selector:
        text:
    enabled:
      name: Enabled
      description: Whether the timer is active.
      default: true
      selector:
        boolean:
    schedule_type:
      name: Schedule Type
      description: "Type of schedule: once, daily, weekdays, interval, yearly, cron, sun."
      default: once
      selector:
        select:
          options:
            - once
            - daily
            - weekdays
            - interval
            - yearly
            - cron
            - sun
    time:
      name: Time
      description: "Time of day in HH:MM format (for daily, weekdays, yearly)."
      example: "08:00"
      selector:
        text:
    weekdays:
      name: Weekdays
      description: "List of weekday numbers (0=Mon, 6=Sun) for weekdays schedule."
      example: "[0, 1, 2, 3, 4]"
      selector:
        object:
    datetime:
      name: DateTime
      description: "ISO datetime string for once schedule."
      example: "2026-01-01T08:00:00"
      selector:
        text:
    interval:
      name: Interval
      description: Interval value for interval schedule.
      example: 7
      selector:
        number:
          min: 1
          max: 3650
    interval_unit:
      name: Interval Unit
      description: "Unit for interval: days, weeks, months."
      default: days
      selector:
        select:
          options:
            - days
            - weeks
            - months
    month:
      name: Month
      description: Month for yearly schedule (1-12).
      selector:
        number:
          min: 1
          max: 12
    day:
      name: Day
      description: Day of month for yearly schedule (1-31).
      selector:
        number:
          min: 1
          max: 31
    cron:
      name: Cron Expression
      description: "Cron expression (min hour dom month dow)."
      example: "0 8 * * 1-5"
      selector:
        text:
    sun_event:
      name: Sun Event
      description: "sunrise or sunset for sun-based schedule."
      default: sunrise
      selector:
        select:
          options:
            - sunrise
            - sunset
    sun_offset_minutes:
      name: Sun Offset Minutes
      description: Offset in minutes relative to sun event (can be negative).
      default: 0
      selector:
        number:
          min: -240
          max: 240
    actions:
      name: Actions
      description: List of actions to execute when the timer fires.
      selector:
        object:
    conditions:
      name: Conditions
      description: List of conditions that must be met for the timer to fire.
      selector:
        object:
    notifications:
      name: Notifications
      description: Notification configuration for timer events.
      selector:
        object:

